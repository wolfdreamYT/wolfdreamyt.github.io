<!DOCTYPE html>
<html>
<head>
    <title>Source Formula - Wolfstudios</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen">

    <div class="max-w-3xl mx-auto p-6">

        <h1 class="text-3xl font-bold mb-4">
            Source Formula Search Engine
        </h1>
        <p  class="text-1xl mb-4">
            This is a search engine designed for using my custom source providing.
        </p>

        <input
            id="searchBox"
            class="w-full p-3 rounded bg-gray-800 border border-gray-600"
            placeholder="Example: (2) URL 1-5"
        >

        <button
            onclick="doSearch()"
            class="mt-3 px-4 py-2 bg-blue-600 rounded hover:bg-blue-500"
        >
            Search
        </button>

        <div id="results" class="mt-6 space-y-3"></div>

    </div>

    <script src="sources.js"></script>
    <script src="search.js"></script>

</body>
</html>
